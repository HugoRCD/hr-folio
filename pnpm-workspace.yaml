allowBuilds:
  '@parcel/watcher': false
  esbuild: false
  unrs-resolver: false
  vue-demi: false
  '@swc/core': false
  better-sqlite3: true
  sharp: true
  '@nestjs/core': false
  '@prisma/client': true
  '@prisma/engines': true
  cbor-extract: false
  prisma: true
  puppeteer: false

minimumReleaseAge: 2880

minimumReleaseAgeExclude:
  # Nuxt
  - '@nuxt/*'
  - '@nuxtjs/*'
  - 'nuxt'
  - 'nuxt-*'
  # Vercel
  - '@vercel/*'
  - '@ai-sdk/*'
  - 'ai'
  - '@shelve/cli@5.1.0'
  - '@iconify-json/simple-icons@1.2.91'
  - '@unhead/bundler@3.2.1'
  - nuxtseo-shared@5.3.3
  - site-config-stack@4.1.2
  - unhead@3.2.1
