allowBuilds:
  '@parcel/watcher': false
  esbuild: false
  unrs-resolver: false
  vue-demi: false
  '@swc/core': false
  sharp: true
  '@nestjs/core': false
  '@prisma/client': true
  '@prisma/engines': true
  cbor-extract: false
  prisma: true
  puppeteer: false

minimumReleaseAge: 2880

minimumReleaseAgeExclude:
  # Nuxt
  - '@nuxt/*'
  - '@nuxtjs/*'
  - 'nuxt'
  - 'nuxt-*'
  # Vercel
  - '@vercel/*'
  - '@ai-sdk/*'
  - 'ai'
  - '@shelve/cli@5.1.0'
  # Comark (preview tarball via pkg.pr.new — not on npm registry)
  - '@comark/*'
  - 'comark'
